[pytest]
# =============================================================
# Configuração do Pytest — AI-Powered Threat Hunter
# =============================================================

# Diretório raiz dos testes
testpaths = tests

# Formato de saída detalhado
addopts =
    --verbose
    --tb=short
    --strict-markers

# Marcadores customizados para categorizar os testes
markers =
    unit: Testes unitários isolados (sem dependências externas)
    integration: Testes de integração (requerem ELK rodando)
    slow: Testes que demoram mais de 5 segundos
