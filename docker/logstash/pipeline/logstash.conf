# =============================================================
# Pipeline do Logstash — AI-Powered Threat Hunter
#
# Fluxo: INPUT (recebe) → FILTER (normaliza) → OUTPUT (envia)
#
# Este pipeline centraliza três tipos de eventos:
#   1. Logs de autenticação (SSH, sudo, login)
#   2. Tráfego de rede (Zeek/Suricata)
#   3. Logs de aplicação (HTTP, APIs)
# =============================================================


# -------------------------------------------------------------
# SEÇÃO 1: INPUT — Fontes de entrada de dados
# -------------------------------------------------------------
input {

  # Recebe logs via TCP (usado pelo coletor Python e agentes externos)
  tcp {
    port  => 5044
    codec => json_lines  # Cada linha é um JSON independente
    tags  => ["tcp_input"]
  }

  # Recebe logs via UDP (usado pelo Suricata e Zeek)
  udp {
    port  => 5045
    codec => json_lines
    tags  => ["udp_input"]
  }

  # Recebe eventos via HTTP (útil para testes e integrações REST)
  http {
    port => 8080
    tags => ["http_input"]
  }
}


# -------------------------------------------------------------
# SEÇÃO 2: FILTER — Normalização e enriquecimento dos eventos
#
# Objetivo: transformar qualquer formato de entrada no schema
# padrão do projeto, independente da fonte.
# -------------------------------------------------------------
filter {

  # -----------------------------------------------------------
  # 2.1 — Garante que o timestamp seja sempre parseado
  # corretamente, independente do formato da fonte
  # -----------------------------------------------------------
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ssZ", "UNIX"]
    target => "@timestamp"
  }

  # -----------------------------------------------------------
  # 2.2 — Normalização de eventos de autenticação
  # Identifica tentativas de login, sudo e falhas de acesso
  # -----------------------------------------------------------
  if [event_type] == "auth_failure" or [event_type] == "auth_success" {

    mutate {
      # Garante que o campo de contagem seja numérico
      convert => { "count" => "integer" }

      # Adiciona categoria para facilitar filtros no Kibana
      add_field => { "category" => "authentication" }
    }

    # Classifica como crítico se houver muitas falhas seguidas
    if [count] and [count] > 100 {
      mutate {
        add_field => { "severity_hint" => "high" }
        add_tag   => ["brute_force_candidate"]
      }
    }
  }

  # -----------------------------------------------------------
  # 2.3 — Normalização de eventos de rede (Zeek / Suricata)
  # -----------------------------------------------------------
  if [event_type] == "network_connection" or [event_type] == "network_alert" {

    mutate {
      convert      => { "bytes_sent"     => "integer" }
      convert      => { "bytes_received" => "integer" }
      convert      => { "duration_ms"    => "float"   }
      add_field    => { "category"       => "network" }
    }

    # Marca conexões com volume de dados anormalmente alto
    if [bytes_sent] and [bytes_sent] > 10000000 {
      mutate {
        add_field => { "severity_hint" => "medium" }
        add_tag   => ["data_exfiltration_candidate"]
      }
    }
  }

  # -----------------------------------------------------------
  # 2.4 — Normalização de logs de aplicação (HTTP / APIs)
  # -----------------------------------------------------------
  if [event_type] == "http_request" {

    mutate {
      convert   => { "http_status" => "integer" }
      add_field => { "category"    => "application" }
    }

    # Detecta padrões básicos de SQL Injection no payload
    if [request_body] =~ /(?i)(union|select|insert|drop|or\s+1=1|--|;)/ {
      mutate {
        add_field => { "severity_hint" => "high" }
        add_tag   => ["sql_injection_candidate"]
      }
    }
  }

  # -----------------------------------------------------------
  # 2.5 — Campos obrigatórios do schema padrão
  # Garante que todo evento tenha os campos mínimos preenchidos
  # -----------------------------------------------------------
  mutate {
    # Define severity como "unknown" se ainda não foi classificado
    add_field => {
      "severity"       => "%{[severity_hint]}"
      "ml_score"       => -1       # -1 = ainda não processado pelo ML
      "agent_analyzed" => false    # false = ainda não analisado pelo LLM
    }

    # Remove campo temporário usado internamente no pipeline
    remove_field => ["severity_hint"]
  }

  # -----------------------------------------------------------
  # 2.6 — Geolocalização do IP de origem (quando disponível)
  # Enriquece o evento com país e cidade do atacante
  # -----------------------------------------------------------
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geo"
    }
  }
}


# -------------------------------------------------------------
# SEÇÃO 3: OUTPUT — Destino dos eventos normalizados
# -------------------------------------------------------------
output {

  # Envia todos os eventos para o Elasticsearch
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    user     => "${ELASTIC_USERNAME}"
    password => "${ELASTIC_PASSWORD}"

    # Índice dinâmico por data — facilita retenção e busca
    # Exemplo: threat-events-2026.04.19
    index => "threat-events-%{+YYYY.MM.dd}"
  }

  # Saída no console para debug durante desenvolvimento
  # Remova ou comente em produção para não poluir os logs
  stdout {
    codec => rubydebug
  }
}
